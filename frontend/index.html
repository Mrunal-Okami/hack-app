<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veritas | AI Fact Verification</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    /* Heatmap hover animations */
    .heatmap-span { transition: all 0.2s ease-in-out; cursor: pointer; }
    .heatmap-span:hover { filter: brightness(0.95); transform: scale(1.01); }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [inputText, setInputText] = useState("");
      const [results, setResults] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");

      const handleVerify = async () => {
        if (!inputText.trim()) return;
        setLoading(true);
        setError("");
        setResults([]);

        try {
          const response = await fetch("http://localhost:8000/verify", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: inputText }),
          });

          if (!response.ok) throw new Error("Backend API failed");
          
          const data = await response.json();
          setResults(data.results || []);
        } catch (err) {
          setError(err.message || "Failed to connect to backend. Is uvicorn running on port 8000?");
        } finally {
          setLoading(false);
        }
      };

      const handleRepair = async (index) => {
        const claimToFix = results[index];
        try {
          const response = await fetch("http://localhost:8000/repair", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ sentence: claimToFix.sentence, reason: claimToFix.reason }),
          });

          if (!response.ok) throw new Error("Repair failed");
          const data = await response.json();
          
          const newResults = [...results];
          newResults[index] = { 
            ...claimToFix, 
            sentence: data.repaired, 
            verdict: "VERIFIED (REPAIRED)", 
            color: "#22c55e", 
            reason: "Repaired using verified source." 
          };
          setResults(newResults);
        } catch (err) {
          alert("Failed to repair sentence. Check your backend console.");
        }
      };

      return (
        <div className="max-w-4xl mx-auto p-6 mt-10">
          <div className="text-center mb-8">
            <h1 className="text-4xl font-bold tracking-tight text-slate-900">VERITAS</h1>
            <p className="text-slate-500 mt-2">Multi-Modal AI Fact Verification Engine</p>
          </div>

          <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6">
            <textarea
              className="w-full h-40 p-4 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none resize-none"
              placeholder="Paste AI-generated text here to audit its factual accuracy..."
              value={inputText}
              onChange={(e) => setInputText(e.target.value)}
            />
            <button
              onClick={handleVerify}
              disabled={loading || !inputText}
              className="mt-4 w-full bg-slate-900 text-white font-semibold py-3 rounded-lg hover:bg-slate-800 disabled:opacity-50 transition-colors"
            >
              {loading ? "Auditing Claims via Gemini & DDG..." : "Verify Text"}
            </button>
            {error && <p className="text-red-500 text-sm mt-2 text-center">{error}</p>}
          </div>

          {results.length > 0 && (
            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <h2 className="text-xl font-bold mb-4">Authenticity Heatmap</h2>
              <div className="leading-relaxed text-lg mb-8 p-4 bg-slate-50 rounded-lg border border-slate-100">
                {results.map((result, idx) => (
                  <span
                    key={idx}
                    className="heatmap-span inline-block px-1 mx-0.5 rounded"
                    style={{ backgroundColor: result.color + "40", borderBottom: `2px solid ${result.color}` }}
                    title={`Verdict: ${result.verdict}\nReason: ${result.reason}`}
                  >
                    {result.sentence}
                  </span>
                ))}
              </div>

              <div className="space-y-4">
                <h3 className="font-semibold text-slate-700 border-b pb-2">Claim Breakdown</h3>
                {results.map((result, idx) => (
                  <div key={idx} className="p-4 rounded-lg border" style={{ borderColor: result.color }}>
                    <div className="flex justify-between items-start">
                      <div>
                        <p className="font-medium">{result.sentence}</p>
                        <p className="text-sm mt-2 text-slate-600"><strong>Verdict:</strong> {result.verdict}</p>
                        <p className="text-sm text-slate-600"><strong>Reason:</strong> {result.reason}</p>
                      </div>
                      {result.color === "#ef4444" && (
                        <button onClick={() => handleRepair(idx)} className="ml-4 bg-red-100 text-red-700 px-4 py-2 rounded-md hover:bg-red-200 font-medium text-sm whitespace-nowrap transition-colors">
                          🔧 Fix It
                        </button>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // Initialize React
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
